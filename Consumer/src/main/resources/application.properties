spring.application.name=Consumer

server.port=8082
# database properties

server.servlet.context-path=/api/v1/consumer

spring.datasource.url=jdbc:postgresql://localhost:5432/eventStreaming

spring.datasource.username=sangambarnwal
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.driver-class-name=org.postgresql.Driver

# This ensures 1000 events inserted in 1 query (not 1000 queries)
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true


# kafka brokers
spring.kafka.bootstrap-servers=localhost:29093,localhost:29094,localhost:29092

spring.kafka.consumer.group-id=event-processor

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer 


spring.kafka.consumer.properties.spring.json.type.mapping=com.eventStreaming.ProducerApp.model.TemperatureEvent:com.eventStreaming.Consumer.model.SensorEvent,com.eventStreaming.ProducerApp.model.HumidityEvent:com.eventStreaming.Consumer.model.SensorEvent

spring.kafka.consumer.properties.spring.json.value.default.type=com.eventStreaming.Consumer.model.SensorEvent

# spring.kafka.listener.concurrency=5

#  so consumer can consume from scratch
spring.kafka.consumer.auto-offset-reset=earliest